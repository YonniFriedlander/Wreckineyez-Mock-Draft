<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Jazz cup palette */
  --bg:#0B0B14;
  --s1:#12121E;   /* card surface */
  --s2:#1A1A2A;   /* elevated surface */
  --s3:#222236;   /* hover / active surface */
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#F0EDE8;
  --text2:#9896A8;
  --text3:#5A5868;
  /* Jazz accents */
  --teal:#00C8C0;
  --teal2:#00A8A0;
  --teal-dim:rgba(0,200,192,0.12);
  --teal-border:rgba(0,200,192,0.3);
  --mag:#E8366E;
  --mag2:#C42A5A;
  --mag-dim:rgba(232,54,110,0.12);
  --mag-border:rgba(232,54,110,0.3);
  --purp:#8B5CF6;
  --purp-dim:rgba(139,92,246,0.12);
  --purp-border:rgba(139,92,246,0.3);
  /* status (remapped) */
  --go:#00C8C0;     --go-bg:rgba(0,200,192,0.1);    --go-border:rgba(0,200,192,0.3);
  --warn:#F59E0B;   --warn-bg:rgba(245,158,11,0.1); --warn-border:rgba(245,158,11,0.3);
  --info:#8B5CF6;   --info-bg:rgba(139,92,246,0.1); --info-border:rgba(139,92,246,0.3);
  --danger:#E8366E;
  --r:7px;--rl:11px;--rxl:16px;
}
html{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;color:var(--text);background:var(--bg)}
body{min-height:100vh}

/* ── header ── */
.site-header{
  position:sticky;top:0;z-index:30;height:56px;
  display:flex;align-items:center;gap:14px;padding:0 22px;
  background:var(--s1);border-bottom:1px solid var(--border2);
  overflow:hidden;
}
/* Jazz swoosh shapes rendered as a background SVG */
.site-header::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 180px 60px at -20px 80px, rgba(0,200,192,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 120px 40px at 110% 20px, rgba(232,54,110,0.16) 0%, transparent 70%),
    radial-gradient(ellipse 200px 50px at 60% 120%, rgba(139,92,246,0.10) 0%, transparent 70%);
}
.site-header>*{position:relative;z-index:1}

.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{
  width:34px;height:34px;border-radius:7px;
  background:linear-gradient(135deg,var(--purp) 0%,var(--mag) 55%,var(--teal) 100%);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 14px rgba(232,54,110,0.4);
}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text);line-height:1}
.logo-sub{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);line-height:1}

.header-steps{display:flex;gap:3px;margin-left:auto}
.hstep{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;
  color:var(--text3);border:1px solid transparent;cursor:pointer;
  transition:all 0.15s;letter-spacing:0.02em}
.hstep.on{background:var(--teal);color:#0B0B14;border-color:var(--teal)}
.hstep.done{color:var(--text2)}
.hstep:hover:not(.on){background:var(--s3);color:var(--text)}

/* ── page ── */
.page{max-width:1280px;margin:0 auto;padding:28px 36px 70px}
/* Draft and results pages share the same outer margin */
.draft-page{max-width:1280px;margin:0 auto;padding:20px 36px 70px}
.results-page{max-width:1280px;margin:0 auto;padding:28px 36px 70px}
.draft-layout{display:flex;gap:20px;align-items:flex-start}
.draft-main{flex:1;min-width:0}
.draft-sidebar{
  width:220px;flex-shrink:0;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);
  padding:14px 14px;position:sticky;top:74px;max-height:calc(100vh - 90px);overflow-y:auto;
}
.sidebar-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text3);margin-bottom:12px}
.sb-team{padding:7px 9px;border-radius:var(--r);margin-bottom:4px;border:1px solid transparent;
  transition:background 0.12s}
.sb-team:hover{background:var(--s2)}
.sb-mine{background:var(--mag-dim);border-color:var(--mag-border) !important}
.sb-my-team-panel{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border2)}
.sb-my-player{display:flex;align-items:center;gap:6px;padding:3px 2px;font-size:11px}
.sb-slot-label{font-size:9px;font-weight:800;text-transform:uppercase;width:32px;
  flex-shrink:0;color:var(--text3);letter-spacing:0.05em}
.sb-slot-label.filled{color:var(--text2)}
.sb-player-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-weight:600;color:var(--text)}
.sb-player-round{font-size:10px;color:var(--text3);flex-shrink:0}
.sb-name{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;
  justify-content:space-between;margin-bottom:5px}
.sb-count{font-size:10px;font-weight:600;color:var(--text3);background:var(--s3);
  border-radius:8px;padding:1px 6px}
.sb-pos-row{display:flex;gap:4px;flex-wrap:wrap}
.step-head{margin-bottom:26px}
.step-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;
  letter-spacing:0.04em;text-transform:uppercase;color:var(--text);line-height:1}
.step-head p{color:var(--text2);font-size:13px;margin-top:6px;line-height:1.55}

/* ── cards ── */
.countdown{display:flex;align-items:center;gap:16px;background:var(--s1);
  border:1px solid var(--border);border-radius:var(--rl);padding:14px 20px;
  margin-bottom:20px;flex-wrap:wrap}
.countdown-label{font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--text3);flex-shrink:0}
.countdown-units{display:flex;gap:12px;flex:1;flex-wrap:wrap}
.countdown-unit{display:flex;flex-direction:column;align-items:center;min-width:40px}
.countdown-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  line-height:1;color:var(--teal);font-variant-numeric:tabular-nums}
.countdown-sub{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text3);margin-top:2px}
.countdown-live{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  color:var(--mag);letter-spacing:0.04em;text-transform:uppercase;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@media(max-width:768px){
  .countdown{padding:10px 14px;gap:10px}
  .countdown-num{font-size:22px}
}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:16px}

/* ── form elements ── */
input,select{
  font-family:'Inter',sans-serif;font-size:13px;color:var(--text);
  border:1px solid var(--border2);border-radius:var(--r);
  background:var(--s2);outline:none;padding:8px 11px;height:36px;width:100%;
  transition:border-color 0.15s,box-shadow 0.15s;
}
input::placeholder{color:var(--text3)}
input:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
select option{background:var(--s2);color:var(--text)}
input[type=range]{
  height:auto;padding:0;border:none;background:none;box-shadow:none;cursor:pointer;
  accent-color:var(--teal);
}
input[type=radio],input[type=checkbox]{width:auto;height:auto;accent-color:var(--teal)}
input[type=file]{height:auto;padding:6px 0;border:none;background:none;font-size:12px;width:auto;color:var(--text2)}
.frow{display:flex;flex-direction:column;gap:5px}
.frow label{font-size:12px;font-weight:600;color:var(--text2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}

/* ── buttons ── */
button{
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  color:var(--text);border:1px solid var(--border2);border-radius:var(--r);
  background:var(--s2);padding:7px 14px;cursor:pointer;
  transition:background 0.12s,border-color 0.12s,transform 0.1s;line-height:1.4;white-space:nowrap;
}
button:hover{background:var(--s3);border-color:var(--border2)}
button:active{transform:scale(0.97)}
button.primary{background:var(--teal);color:#0B0B14;border-color:var(--teal);font-weight:800}
button.primary:hover{background:var(--teal2);border-color:var(--teal2)}
button.hot{background:var(--mag);color:#fff;border-color:var(--mag);font-weight:800}
button.hot:hover{background:var(--mag2);border-color:var(--mag2)}
button.ghost{border:none;background:transparent;padding:4px 8px;color:var(--text3)}
button.ghost:hover{background:var(--s3);color:var(--text)}
button.danger-ghost{border:none;background:transparent;padding:4px 8px;color:var(--danger)}
button.danger-ghost:hover{background:var(--mag-dim)}
button:disabled{opacity:0.32;cursor:not-allowed;pointer-events:none}

/* ── banners ── */
.banner{padding:11px 15px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:9px;border:1px solid}
.banner.ok{background:var(--go-bg);color:var(--go);border-color:var(--go-border)}
.banner.warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.banner.info{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.banner.hot{background:var(--mag-dim);color:var(--mag);border-color:var(--mag-border)}

/* ── pos badges ── */
.pb{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.04em;line-height:1.5}
.QB{background:rgba(245,158,11,0.15);color:#FACC15}
.RB{background:rgba(0,200,192,0.15);color:#00C8C0}
.WR{background:rgba(139,92,246,0.18);color:#A78BFA}
.TE{background:rgba(232,54,110,0.15);color:#F472B6}
.K {background:rgba(255,255,255,0.07);color:#9896A8}
.DST{background:rgba(255,255,255,0.07);color:#9896A8}

/* ── tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:2px}
.tab{border:none;border-bottom:2px solid transparent;border-radius:0;padding:9px 18px;
  font-size:13px;font-weight:700;background:none;color:var(--text3);margin-bottom:-1px;cursor:pointer;letter-spacing:0.02em}
.tab.on{color:var(--teal);border-bottom-color:var(--teal)}
.tab:hover{background:var(--s2);color:var(--text)}

/* ── autocomplete ── */
.ac{position:relative}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:60;
  background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);max-height:210px;overflow-y:auto}
.ac-item{padding:8px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--s3)}

/* ── team list ── */
.team-list{display:flex;flex-direction:column;gap:5px}
.team-item{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);user-select:none;
  transition:border-color 0.15s,background 0.15s}
.team-item.ghost-over{border-color:var(--teal);background:var(--teal-dim)}
.team-num{font-size:11px;font-weight:700;color:var(--text3);width:18px;text-align:right;flex-shrink:0}
.team-drag{cursor:grab;color:var(--text3);font-size:16px;flex-shrink:0;padding:0 2px;line-height:1}
.team-drag:active{cursor:grabbing}
.team-edit{flex:1;font-size:13px;font-weight:600;border:none;background:transparent;
  outline:none;color:var(--text);padding:0}
.team-edit:focus{color:var(--teal)}
.team-you{background:var(--mag);color:#fff;border-radius:4px;font-size:10px;font-weight:800;
  padding:2px 7px;letter-spacing:0.05em;text-transform:uppercase}
.add-team-row{display:flex;gap:8px;margin-top:8px}

/* ── filter pills ── */
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  border:1px solid var(--border2);background:var(--s2);cursor:pointer;color:var(--text2);
  transition:all 0.12s;letter-spacing:0.02em}
.pill.on{background:var(--teal);color:#0B0B14;border-color:var(--teal)}

/* ── boards ── */
.board-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl)}
/* In setup, let the board be full width without internal scroll */
.setup-board-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl)}
.btable{border-collapse:collapse;font-size:11px;width:100%;table-layout:fixed}
.btable th,.btable td{
  padding:0;text-align:center;
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  vertical-align:middle}
.btable th{height:52px;padding:0 1px;overflow:hidden}
.btable th:last-child,.btable td:last-child{border-right:none}
.btable thead th{
  background:var(--bg);font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.07em;color:var(--text3);border-bottom:1px solid var(--border2);border-right:1px solid var(--border)}
/* your column header — magenta */
.btable thead th.mine-h{background:var(--mag-dim);color:var(--mag);border-bottom-color:var(--mag-border)}
/* Rotated team name in header */
.bth-inner{display:block;writing-mode:vertical-rl;transform:rotate(180deg);
  white-space:nowrap;font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:0.05em;padding:4px 0;margin:0 auto;max-height:50px;overflow:hidden}
/* round column — sticky left */
.rh{
  text-align:center;font-size:9px;font-weight:700;color:var(--text3);
  position:sticky;left:0;background:var(--bg);z-index:2;
  width:18px !important;padding:0 2px;border-right:1px solid var(--border2) !important}
/* even rows slightly lighter */
.btable tbody tr:nth-child(even) td:not(.rh){background:rgba(255,255,255,0.015)}
.btable td.mine-col{background:rgba(232,54,110,0.05)}
.btable td.cur{background:rgba(245,158,11,0.12);outline:2px solid var(--warn);outline-offset:-2px}
.btable td.keeper{background:rgba(0,200,192,0.08)}
.btable td.traded{background:rgba(245,158,11,0.08)}
.btable td.clickable{cursor:pointer}
.btable td.clickable:hover{background:var(--s3)}
/* Compact cells — pos+rank on top, name below */
.bcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  padding:2px 1px;height:40px;width:100%;overflow:hidden}
.bcell .bn{font-size:9px;font-weight:700;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.bcell .bm{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.bcell .bnum{font-size:8px;color:var(--text3);font-weight:400}

/* ── player table ── */
.ptable-wrap{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable thead{background:var(--bg)}
.ptable th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);border-bottom:1px solid var(--border2)}
.ptable td{padding:9px 12px;border-bottom:1px solid var(--border);background:var(--s1)}
.ptable tr:last-child td{border-bottom:none}
.ptable tr.pr:hover td{background:var(--s2);cursor:pointer}
.ptable tr.sel td{background:var(--mag-dim)}
.ptable tr.sel td:first-child{border-left:3px solid var(--mag)}

/* ── clock banner ── */
.clock{
  border-radius:var(--rl);padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-bottom:22px;border:1px solid;position:relative;overflow:hidden;
}
.clock::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 300px 80px at -10% 100%, rgba(0,200,192,0.08) 0%,transparent 70%),
    radial-gradient(ellipse 200px 60px at 110% 0%, rgba(139,92,246,0.08) 0%,transparent 70%);
}
.clock>*{position:relative;z-index:1}
.clock.mine{
  background:var(--s1);border-color:var(--mag-border);
  box-shadow:0 0 40px rgba(232,54,110,0.12);
}
.clock.mine::before{
  background:
    radial-gradient(ellipse 320px 100px at -5% 120%, rgba(232,54,110,0.12) 0%,transparent 70%),
    radial-gradient(ellipse 200px 70px at 110% -20%, rgba(139,92,246,0.1) 0%,transparent 70%);
}
.clock.theirs{background:var(--s1);border-color:var(--border2)}
.clock-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px}
.clock-name{
  font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;
  line-height:1;text-transform:uppercase;letter-spacing:0.03em}
.clock-sub{font-size:12px;margin-top:6px;color:var(--text3);font-weight:500}

/* ── progress ── */
.pbar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;flex:1}
.pfill{height:100%;background:linear-gradient(90deg,var(--purp),var(--teal));border-radius:2px;transition:width 0.4s}

/* ── topbar ── */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}

/* ── modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:var(--rxl);
  padding:26px;width:100%;max-width:430px;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.modal-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.modal-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.modal-sec-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}

/* ── chips ── */
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:20px;border:1px solid var(--border2);background:var(--s2);font-size:12px;font-weight:600}
.chip-x{border:none;background:none;padding:0;width:16px;height:16px;font-size:16px;
  line-height:1;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.chip-x:hover{color:var(--danger);transform:none;background:none}

/* ── scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── roster counts ── */
.rcounts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}

/* ── needs summary (clock banner) ── */
.needs-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.need-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect,useMemo}=React;

const POSITIONS=["ALL","QB","RB","WR","TE","RB/WR"];
// Name suffixes to skip when extracting last name for display
const NAME_SUFFIXES=new Set(["jr","jr.","sr","sr.","ii","iii","iv","v","vi"]);
function lastName(name){
  if(!name)return"";
  const parts=name.trim().split(/\s+/);
  if(parts.length<=1)return parts[0]||"";
  // If last part is a suffix, use the part before it
  const last=parts[parts.length-1].toLowerCase().replace(/\.$/,"");
  if(NAME_SUFFIXES.has(last+".")|| NAME_SUFFIXES.has(last)){
    return parts.slice(-2).join(" ");
  }
  return parts[parts.length-1];
}

// Responsive breakpoint hook — mirrors the CSS breakpoint at 768px.
// Components that need fundamentally different markup on mobile (not just
// different CSS) read this to choose between desktop and mobile JSX paths.
// Desktop rendering paths are untouched; this only adds a parallel mobile path.
const MOBILE_BREAKPOINT=768;
function useIsMobile(){
  const[isMobile,setIsMobile]=useState(
    typeof window!=="undefined"?window.innerWidth<MOBILE_BREAKPOINT:false
  );
  useEffect(()=>{
    function onResize(){setIsMobile(window.innerWidth<MOBILE_BREAKPOINT);}
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);
  return isMobile;
}

const DEF_TEAMS=["Leigh","Stan","Bram","Rob","Bruce","Cory","Liam","James","Pat","Budd","Chow","Evan","Yonni","Aaron"];
const DEF_MY="Yonni";
const DEF_ROSTER={QB:1,RB:2,WR:3,TE:1,FLEX:1,BN:5};
const DEF_TEND={QB:1,RB:1,WR:1,TE:1};
// 2026 traded picks (pre-loaded from league Excel)
// Leigh=1,Stan=2,Bram=3,Rob=4,Bruce=5,Cory=6,Liam=7,James=8,Pat=9,Budd=10,Chow=11,Evan=12,Yonni=13,Aaron=14
const DEF_TRADED_PICKS=[
  {fromPick:14,toTeam:"Rob"},    // Aaron R1 → Rob
  {fromPick:60,toTeam:"Aaron"},  // Rob R5 → Aaron
  {fromPick:26,toTeam:"Bruce"},  // Bram R2 → Bruce
  {fromPick:89,toTeam:"Bram"},   // Bruce R7 → Bram
  {fromPick:38,toTeam:"Rob"},    // Budd R3 → Rob
  {fromPick:109,toTeam:"Budd"},  // Rob R8 → Budd
  {fromPick:46,toTeam:"Stan"},   // Chow R4 → Stan
  {fromPick:114,toTeam:"Chow"},  // Stan R9 → Chow
  {fromPick:12,toTeam:"Stan"},   // Evan R1 → Stan
  {fromPick:83,toTeam:"Evan"},   // Stan R6 → Evan
  {fromPick:77,toTeam:"Yonni"},  // James R6 → Yonni
  {fromPick:13,toTeam:"James"},  // Yonni R1 → James
];
const SK="wreckineyez-mock-v5";

function load(){try{return JSON.parse(localStorage.getItem(SK)||"{}")}catch{return{}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}

function gauss(){
  let u,v;
  do{u=Math.random()}while(u===0);
  do{v=Math.random()}while(v===0);
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);
  const hdrs=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(l=>{
    const vs=l.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
    const o={};hdrs.forEach((h,i)=>o[h]=vs[i]||"");return o;
  });
}
function posType(p){return p?p.replace(/\d+$/,""):"?"}

// Assign positional ranks (RB1, RB2, etc.) to players that are missing them
function assignPosRanks(players){
  const counters={};
  // Sort by rank first so positional numbers are assigned in order
  const sorted=[...players].sort((a,b)=>a.rank-b.rank);
  sorted.forEach(p=>{
    if(!p.posRank||p.posRank===p.pos){
      counters[p.pos]=(counters[p.pos]||0)+1;
      p.posRank=p.pos+counters[p.pos];
    }
  });
  return players;
}

function normPlayers(rows){
  // Try to detect format from headers
  const first=rows[0]||{};
  const isECR="PLAYER NAME" in first||"RK" in first;

  let players;
  if(isECR){
    players=rows.filter(r=>r["PLAYER NAME"]&&r["RK"]).map((r,i)=>({
      rank:   parseInt(r["RK"])||i+1,
      name:   (r["PLAYER NAME"]||"").trim(),
      team:   (r["TEAM"]||r["Team"]||"").trim().toUpperCase(),
      pos:    posType(r["POS"]||""),
      posRank:r["POS"]||"",
      bye:    (r["BYE WEEK"]||r["Bye"]||r["BYE"]||"").trim(),
      tier:   parseInt(r["TIERS"]||r["Tier"]||"1")||1,
    }));
  } else {
    // ADP format — column names vary between downloads
    players=rows.filter(r=>r["Player"]||r["Name"]).map((r,i)=>({
      rank:   parseInt(r["Rank"]||r["RK"]||r["Overall Rank"]||"")||i+1,
      name:   (r["Player"]||r["Name"]||"").trim(),
      team:   (r["Team"]||r["TEAM"]||"").trim().toUpperCase(),
      pos:    posType(r["POS"]||r["Position"]||""),
      posRank:r["POS"]||r["Position"]||"",
      bye:    (r["Bye"]||r["BYE"]||r["BYE WEEK"]||"").trim(),
      tier:   1,
    }));
  }

  // Filter blanks, then fill in any missing posRank values
  players=players.filter(p=>p.name);
  return assignPosRanks(players);
}

function buildOrder(nTeams,nRounds){
  const picks=[];
  for(let r=0;r<nRounds;r++){
    const row=r%2===0?[...Array(nTeams).keys()]:[...Array(nTeams).keys()].reverse();
    row.forEach(t=>picks.push({round:r+1,teamIdx:t,overall:picks.length+1}));
  }
  return picks;
}

function needPenalty(pos,roster,round,nRounds,slots){
  const cnt=(roster||[]).filter(p=>p.pos===pos).length;
  const late=round>nRounds*0.65;
  if(pos==="QB"){if(cnt>=2)return 40;if(cnt>=1&&!late)return 12;if(cnt>=1&&late)return 2.5;return 1;}
  if(pos==="TE"){if(cnt>=2)return 30;if(cnt>=1&&!late)return 10;if(cnt>=1&&late)return 2;return 1;}
  if(pos==="RB"||pos==="WR"){
    const st=slots[pos]||(pos==="RB"?2:3),fl=slots.FLEX||1,bn=slots.BN||5;
    if(cnt>=st+fl+Math.round(bn*0.4))return 4;
    if(cnt>=st+fl)return 1.6;if(cnt>=st)return 1.2;return 1;
  }
  // K and DST: only draftable if the roster has explicit slots
  if(pos==="K"){if(!(slots.K>0))return 99999;if(cnt>=1)return 999;if(!late)return 8;return 1;}
  if(pos==="DST"){if(!(slots.DST>0))return 99999;if(cnt>=1)return 999;if(!late)return 8;return 1;}
  return 1;
}
function simPick(players,drafted,variability,roster,round,nRounds,slots,tend){
  const avail=players.filter(p=>!drafted.has(p.name));
  if(!avail.length)return null;
  // Tendency decays exponentially by round: full strength early, near-neutral late.
  // decay = e^(-0.3*(round-1)) → 1.0 at R1, ~0.33 at R5, ~0.10 at R9, ~0.03 at R12
  const decay=Math.exp(-0.3*(round-1));
  const scored=avail.map(p=>{
    const sd=Math.max(1.5,p.rank*0.10+1.0)*variability;
    const tv=tend[p.pos]??1;
    // Blend tendency toward neutral (1.0) as rounds progress
    const effectiveTend=1+(tv-1)*decay;
    return{player:p,score:(p.rank+gauss()*sd)*effectiveTend*needPenalty(p.pos,roster,round,nRounds,slots)};
  });
  scored.sort((a,b)=>a.score-b.score);
  return scored[0].player;
}

/*
 * computeSurvival
 * ---------------
 * Deterministic sigmoid formula calibrated against Monte Carlo ground truth:
 *
 *   P(survive) = Φ((effectiveRank - (n_picks + 1)) / σ)
 *
 * where:
 *   σ = 1.23 × n_picks^0.334 × max(0.05, variability)
 *       (calibrated: σ scales linearly with variability)
 *
 *   effectiveRank = position of player in pool sorted by (rank × tendency[pos])
 *       (tendencies < 1 → position reached earlier; > 1 → avoided, reached later)
 *
 * Guaranteed monotone within each position group. Fast O(n log n).
 */
function computeSurvival(availPlayers,picks,order,currentPickIdx,myIdx,
                          numRounds,rosterSlots,tendencies,variability,teams){
  const isMyTurnNow=order[currentPickIdx]&&order[currentPickIdx].teamIdx===myIdx&&!picks[order[currentPickIdx].overall];

  let searchFrom=isMyTurnNow?currentPickIdx+1:currentPickIdx;
  let myNextIdx=-1;
  for(let i=searchFrom;i<order.length;i++){
    const slot=order[i];
    if(slot.teamIdx===myIdx&&!picks[slot.overall]){myNextIdx=i;break;}
  }

  const out={};
  availPlayers.forEach(p=>out[p.name]=1.0);
  if(myNextIdx===-1)return out;

  const intervening=[];
  const startIdx=isMyTurnNow?currentPickIdx+1:currentPickIdx;
  for(let i=startIdx;i<myNextIdx;i++){
    const pick=order[i];
    if(!picks[pick.overall]&&pick.teamIdx!==myIdx)intervening.push(pick);
  }
  if(intervening.length===0)return out;

  const nPicks=intervening.length;
  // σ: calibrated power law × linear variability scaling
  const sigma=1.23*Math.pow(nPicks,0.334)*Math.max(0.05,variability);
  const cutoff=nPicks+1;

  // Standard normal CDF (Abramowitz & Stegun 26.2.17, max error 7.5e-8)
  function normalCDF(x){
    if(x>6)return 1;if(x<-6)return 0;
    const t=1/(1+0.2316419*Math.abs(x));
    const poly=t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
    const base=1-poly*Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);
    return x>=0?base:1-base;
  }

  // Sort pool by effective score = rank × tendency[pos], with round decay applied.
  // Use the average round of intervening picks as the decay reference point.
  const avgRound=intervening.reduce((s,p)=>s+(p.round||1),0)/intervening.length;
  const decay=Math.exp(-0.3*(avgRound-1));
  const sorted=[...availPlayers].sort((a,b)=>{
    const tv_a=tendencies[a.pos]??1;
    const tv_b=tendencies[b.pos]??1;
    const ea=a.rank*(1+(tv_a-1)*decay);
    const eb=b.rank*(1+(tv_b-1)*decay);
    return ea-eb;
  });

  sorted.forEach((p,i)=>{
    const rankInPool=i+1;
    out[p.name]=normalCDF((rankInPool-cutoff)/sigma);
  });

  return out;
}

/* ── PB ── */
function PB({pos,posRank,style}){
  return<span className={`pb ${pos}`} style={style}>{posRank||pos}</span>;
}

/* ── Autocomplete ── */
function AC({value,onChange,players,placeholder}){
  const[q,setQ]=useState(value||"");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>setQ(value||""),[value]);
  const matches=useMemo(()=>
    q.length>=1?players.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,9):[]
  ,[q,players]);
  useEffect(()=>{
    const h=e=>{if(!ref.current?.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  function pick(p){setQ(p.name);onChange(p.name);setOpen(false)}
  return(
    <div className="ac" ref={ref}>
      <input value={q} placeholder={placeholder||"Search…"}
        onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true)}}
        onFocus={()=>setOpen(true)}/>
      {open&&matches.length>0&&(
        <div className="ac-list">
          {matches.map(p=>(
            <div key={p.name} className="ac-item" onMouseDown={()=>pick(p)}>
              <PB pos={p.pos} posRank={p.posRank}/>
              <span style={{fontWeight:600}}>{p.name}</span>
              <span style={{color:"var(--text3)",fontSize:11,marginLeft:"auto"}}>{p.team}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Team Manager ── */
function TeamManager({teams,setTeams,myTeam,setMyTeam}){
  const[newName,setNewName]=useState("");
  const dragIdx=useRef(null);
  const[overIdx,setOverIdx]=useState(null);

  function rename(i,val){
    const t=[...teams];const old=t[i];t[i]=val;setTeams(t);
    if(myTeam===old)setMyTeam(val);
  }
  function remove(i){
    const t=teams.filter((_,j)=>j!==i);setTeams(t);
    if(myTeam===teams[i])setMyTeam(t[0]||"");
  }
  function addTeam(){
    const n=newName.trim();if(!n||teams.includes(n))return;
    setTeams([...teams,n]);setNewName("");
  }
  function onDragStart(i){dragIdx.current=i}
  function onDragOver(e,i){e.preventDefault();setOverIdx(i)}
  function onDrop(i){
    if(dragIdx.current===null||dragIdx.current===i){setOverIdx(null);return}
    const t=[...teams];const[m]=t.splice(dragIdx.current,1);t.splice(i,0,m);
    setTeams(t);dragIdx.current=null;setOverIdx(null);
  }

  return(
    <div>
      <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>
        {teams.length} teams · drag to reorder · click a name to rename
      </div>
      <div className="team-list">
        {teams.map((t,i)=>(
          <div key={i} className={`team-item${overIdx===i?" ghost-over":""}`}
            draggable onDragStart={()=>onDragStart(i)}
            onDragOver={e=>onDragOver(e,i)} onDrop={()=>onDrop(i)}
            onDragEnd={()=>setOverIdx(null)}>
            <span className="team-drag">⠿</span>
            <span className="team-num">{i+1}</span>
            <input className="team-edit" defaultValue={t} key={`${i}-${t}`}
              onBlur={e=>{const v=e.target.value.trim();if(v&&v!==t)rename(i,v)}}
              onKeyDown={e=>{if(e.key==="Enter")e.target.blur()}}/>
            {t===myTeam&&<span className="team-you">You</span>}
            <button className="ghost" onClick={()=>remove(i)}
              style={{padding:"2px 7px",fontSize:16,lineHeight:1,color:"var(--text3)"}}>×</button>
          </div>
        ))}
      </div>
      <div className="add-team-row">
        <input value={newName} onChange={e=>setNewName(e.target.value)}
          placeholder="Add team…" style={{flex:1}}
          onKeyDown={e=>{if(e.key==="Enter")addTeam()}}/>
        <button onClick={addTeam} disabled={!newName.trim()} style={{padding:"7px 20px"}}>+ Add</button>
      </div>
    </div>
  );
}

/* ── Pre-draft board ── */
function PreDraftBoard({teams,myTeam,numRounds,players,keepers,setKeepers,tradedPicks,setTradedPicks,fullWidth}){
  const[modal,setModal]=useState(null);
  const[kPlayer,setKPlayer]=useState("");
  const[tradeTo,setTradeTo]=useState("");
  const myIdx=teams.indexOf(myTeam);
  const order=useMemo(()=>buildOrder(teams.length,numRounds),[teams,numRounds]);

  const keeperByPick={};
  keepers.forEach(k=>{
    const ti=teams.indexOf(k.team);
    const slot=order.find(p=>p.round===parseInt(k.round)&&p.teamIdx===ti);
    if(slot)keeperByPick[slot.overall]=k;
  });
  const tradeByPick={};
  tradedPicks.forEach(t=>tradeByPick[t.fromPick]=t);

  function openCell(pick){
    const keeper=keeperByPick[pick.overall];
    const trade=tradeByPick[pick.overall];
    const others=teams.filter(t=>t!==teams[pick.teamIdx]);
    setKPlayer(keeper?.player||"");
    setTradeTo(trade?.toTeam||others[0]||"");
    setModal({...pick,keeper,trade});
  }
  function saveKeeper(){
    if(!kPlayer)return;
    const{round,teamIdx}=modal;const team=teams[teamIdx];
    setKeepers(prev=>prev.filter(k=>!(k.team===team&&parseInt(k.round)===round)&&k.player!==kPlayer));
    setKeepers(prev=>[...prev,{team,player:kPlayer,round}]);
    setModal(null);setKPlayer("");
  }
  function clearKeeper(){
    const{round,teamIdx}=modal;const team=teams[teamIdx];
    setKeepers(prev=>prev.filter(k=>!(k.team===team&&parseInt(k.round)===round)));
    setModal(null);
  }
  function saveTrade(){
    const{overall,teamIdx}=modal;
    setTradedPicks(prev=>[...prev.filter(t=>t.fromPick!==overall),
      {fromTeam:teams[teamIdx],fromPick:overall,toTeam:tradeTo}]);
    setModal(null);
  }
  function clearTrade(){
    setTradedPicks(prev=>prev.filter(t=>t.fromPick!==modal.overall));
    setModal(null);
  }
  const rounds=Array.from({length:numRounds},(_,i)=>i+1);
  return(
    <>
      <div style={{display:"flex",gap:16,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"var(--text3)"}}>Click any cell to set a keeper or traded pick.</span>
        <div style={{display:"flex",gap:10}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:700,color:"var(--go)"}}>
            <span style={{width:10,height:10,background:"var(--go-bg)",border:"1px solid var(--go-border)",borderRadius:2,display:"inline-block"}}></span>
            Keeper
          </span>
          <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:700,color:"var(--warn)"}}>
            <span style={{width:10,height:10,background:"var(--warn-bg)",border:"1px solid var(--warn-border)",borderRadius:2,display:"inline-block"}}></span>
            Traded
          </span>
        </div>
      </div>
      <div className={fullWidth?"setup-board-wrap":"board-wrap"}>
        <table className="btable" style={fullWidth?{width:"100%"}:{}}>
          <thead>
            <tr>
              <th className="rh" style={{background:"var(--bg)"}}></th>
              {teams.map((t,i)=><th key={i} className={i===myIdx?"mine-h":""}><span className="bth-inner">{t}</span></th>)}
            </tr>
          </thead>
          <tbody>
            {rounds.map(r=>{
              // Use arrays per team-slot so multiple traded picks landing on the same
              // team in the same round don't overwrite each other.
              const byTeam={};
              order.filter(p=>p.round===r).forEach(p=>{
                if(!byTeam[p.teamIdx])byTeam[p.teamIdx]=[];
                byTeam[p.teamIdx].push(p);
              });
              return(
                <tr key={r}>
                  <td className="rh">{r}</td>
                  {teams.map((_,i)=>{
                    const cellPicks=byTeam[i]||[];
                    if(!cellPicks.length)return<td key={i}/>;
                    return(
                      <td key={i} style={{padding:cellPicks.length>1?"3px 4px":undefined}}>
                        {cellPicks.map(pick=>{
                          const keeper=keeperByPick[pick.overall];
                          const trade=tradeByPick[pick.overall];
                          const pl=keeper?players.find(p=>p.name===keeper.player):null;
                          return(
                            <div key={pick.overall}
                              className={`bcell clickable${i===myIdx?" mine-col":""}${keeper?" keeper":""}${trade&&!keeper?" traded":""}`}
                              style={{borderRadius:"var(--r)",padding:"2px 1px",marginBottom:cellPicks.length>1?2:0}}
                              onClick={()=>openCell(pick)}>
                              {keeper?(
                                <>
                                  {pl&&<PB pos={pl.pos} posRank={pl.pos} style={{fontSize:8,padding:"0 3px"}}/>}
                                  <span className="bn" style={{color:"var(--go)"}}>{lastName(keeper.player)}</span>
                                  <span className="bm" style={{color:"var(--go)",fontSize:7}}>keeper</span>
                                </>
                              ):trade?(
                                <>
                                  <span className="bm" style={{color:"var(--warn)"}}>→</span>
                                  <span className="bn" style={{color:"var(--warn)"}}>{trade.toTeam.slice(0,6)}</span>
                                </>
                              ):(
                                <span className="bnum">#{pick.overall}</span>
                              )}
                            </div>
                          );
                        })}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {modal&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          <div className="modal">
            <div className="modal-title">Round {modal.round} · Pick #{modal.overall}</div>
            <div className="modal-sub">{teams[modal.teamIdx]}'s pick</div>
            <div className="modal-section">
              <div className="modal-sec-label" style={{color:"var(--go)"}}>Keeper</div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}>
                  <AC value={kPlayer} onChange={setKPlayer} players={players}
                    placeholder={players.length?"Search players…":"Load rankings first"}/>
                </div>
                <button className="primary" onClick={saveKeeper} disabled={!kPlayer}
                  style={{padding:"8px 16px"}}>Set</button>
                {modal.keeper&&<button className="danger-ghost" onClick={clearKeeper}>Clear</button>}
              </div>
            </div>
            <div className="modal-section">
              <div className="modal-sec-label" style={{color:"var(--warn)"}}>Traded pick — new owner</div>
              <div style={{display:"flex",gap:8}}>
                <select value={tradeTo} onChange={e=>setTradeTo(e.target.value)} style={{flex:1}}>
                  {teams.filter(t=>t!==teams[modal.teamIdx]).map(t=><option key={t}>{t}</option>)}
                </select>
                <button className="primary" onClick={saveTrade} style={{padding:"8px 16px"}}>Set</button>
                {modal.trade&&<button className="danger-ghost" onClick={clearTrade}>Clear</button>}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <button className="ghost" onClick={()=>setModal(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ── App ── */
function App(){
  const saved=useMemo(load,[]);
  const[screen,setScreen]=useState("setup");
  const[setupTab,setSetupTab]=useState("settings");
  const[teams,setTeams]=useState(saved.teams||DEF_TEAMS);
  const[myTeam,setMyTeam]=useState(saved.myTeam||DEF_MY);
  const[mode,setMode]=useState("mock");
  const[variability,setVariability]=useState(1.5);
  const[players,setPlayers]=useState(saved.players||[]);
  const[ranksMeta,setRanksMeta]=useState(saved.ranksMeta||null);
  const[draftOrder,setDraftOrder]=useState([]);
  const[picks,setPicks]=useState({});
  const[currentPickIdx,setCurrentPickIdx]=useState(0);
  const[keepers,setKeepers]=useState(saved.keepers||[]);
  const[tradedPicks,setTradedPicks]=useState(saved.tradedPicks||DEF_TRADED_PICKS);
  const[rosterSlots,setRosterSlots]=useState(saved.rosterSlots||DEF_ROSTER);
  const[tendencies,setTendencies]=useState(saved.tendencies||DEF_TEND);
  // numRounds = total roster spots (starters + bench). Manual override still possible.
  const derivedRounds=Object.values(rosterSlots).reduce((s,v)=>s+(v||0),0);
  const[numRoundsOverride,setNumRoundsOverride]=useState(saved.numRoundsOverride||null);
  const numRounds=numRoundsOverride||derivedRounds||15;
  const[filterPos,setFilterPos]=useState("ALL");
  const[search,setSearch]=useState("");
  const[selPlayer,setSelPlayer]=useState(null);
  const[isSimming,setIsSimming]=useState(false);
  const[lastPick,setLastPick]=useState(null);
  const[draftTab,setDraftTab]=useState("available");
  // Feature 2: best-avail panel open/closed
  const[bestAvailOpen,setBestAvailOpen]=useState(true);
  // Feature 3: player notes {playerName: noteText}
  const[playerNotes,setPlayerNotes]=useState(saved.playerNotes||{});
  // Feature 5: queue of player names
  const[queue,setQueue]=useState(saved.queue||[]);
  const[queueOpen,setQueueOpen]=useState(false);
  const[generalNotes,setGeneralNotes]=useState(saved.generalNotes||"");
  const[notesOpen,setNotesOpen]=useState(false);
  const[snarkMsg,setSnarkMsg]=useState(null);
  const[snarkTitleText,setSnarkTitleText]=useState("");
  // Feature 9: mid-draft trade modal
  const[tradeModal,setTradeModal]=useState(false);
  const[tradePick,setTradePick]=useState("");
  const[tradeTeam,setTradeTeam]=useState("");
  const[walkthroughDone,setWalkthroughDone]=useState(()=>!!localStorage.getItem("wreckineyez-wt"));
  const[fetchState,setFetchState]=useState("idle");
  const[fetchError,setFetchError]=useState(null);
  const[lastFetchSource,setLastFetchSource]=useState("ecr");
  const simRef=useRef(null);

  // Hosted version: load pre-fetched rankings.json from the same folder as this page
  // instead of a live local proxy. Update rankings.json periodically (see README).
  async function fetchLive(source){
    setFetchState("loading");setFetchError(null);setLastFetchSource(source);
    try{
      const file=`rankings.json?v=${Date.now()}`;
      const r=await fetch(file,{cache:"no-store",signal:AbortSignal.timeout(15000)});
      if(!r.ok)throw new Error(`Could not load ${file} (HTTP ${r.status}). Make sure it's uploaded next to index.html.`);
      const json=await r.json();
      if(!json.players||!json.players.length)throw new Error(`${file} has no players in it.`);
      setPlayers(json.players);
      setRanksMeta({
        name:`FantasyPros ${source.toUpperCase()}${json.updated?"":""}`,
        date:json.updated?new Date(json.updated).toLocaleDateString():new Date().toLocaleDateString(),
      });
      setFetchState("done");
    }catch(e){
      setFetchError(e.message);setFetchState("error");
    }
  }

  useEffect(()=>{
    save({teams,myTeam,numRoundsOverride,keepers,tradedPicks,rosterSlots,tendencies,players,ranksMeta,playerNotes,queue,generalNotes});
  },[teams,myTeam,numRoundsOverride,keepers,tradedPicks,rosterSlots,tendencies,players,ranksMeta,playerNotes,queue]);

  const myIdx=teams.indexOf(myTeam);

  const effectiveOrder=useCallback(()=>{
    if(!draftOrder.length)return[];
    const tm={};tradedPicks.forEach(t=>{tm[t.fromPick]=teams.indexOf(t.toTeam)});
    return draftOrder.map(p=>{const ni=tm[p.overall];return(ni!==undefined&&ni>=0)?{...p,teamIdx:ni}:p});
  },[draftOrder,tradedPicks,teams]);

  // Feature 9: apply a mid-draft pick trade
  function applyMidDraftTrade(){
    if(!tradePick||!tradeTeam)return;
    // tradePick is either "R.PP_overall" (from select UI) or legacy overall number
    let pickNum;
    if(tradePick.includes("_")){
      pickNum=parseInt(tradePick.split("_")[1]);
    } else if(tradePick.includes(".")){
      // resolve round.pos to overall
      const parts=tradePick.split(".");
      const r=parseInt(parts[0]),pos=parseInt(parts[1]);
      const roundPicks=order.filter(p=>p.round===r);
      const sorted=r%2===1?[...roundPicks].sort((a,b)=>a.overall-b.overall):[...roundPicks].sort((a,b)=>b.overall-a.overall);
      pickNum=sorted[pos-1]?.overall;
    } else {
      pickNum=parseInt(tradePick);
    }
    if(!pickNum)return;
    setTradedPicks(prev=>{
      const filtered=prev.filter(t=>t.fromPick!==pickNum);
      return[...filtered,{fromPick:pickNum,toTeam:tradeTeam}];
    });
    setTradeModal(false);setTradePick("");setTradeTeam("");
  }

  // Export CSV of draft results
  function exportCSV(){
    const ord=effectiveOrder();
    const rows=[["Overall","Round","Pick","Team","Player","Position","NFL Team","Bye"]];
    ord.forEach(p=>{
      const player=picks[p.overall];
      const roundPick=((p.overall-1)%teams.length)+1;
      rows.push([
        p.overall,p.round,roundPick,teams[p.teamIdx]||"",
        player?.name||"",player?.pos||"",player?.team||"",player?.bye||""
      ]);
    });
    const csv=rows.map(r=>r.map(v=>String(v).includes(",")?`"${v}"`:v).join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`wreckineyez-draft-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function getRoster(np,order,tIdx){
    return order.filter(p=>p.teamIdx===tIdx&&np[p.overall]).map(p=>np[p.overall]);
  }
  function advance(idx,np,order){let i=idx;while(i<order.length&&np[order[i]?.overall])i++;return i}

  function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const rows=parseCSV(ev.target.result);
        const norm=normPlayers(rows).filter(p=>p.name);
        setPlayers(norm);setRanksMeta({name:file.name,date:new Date().toLocaleDateString()});
      }catch(err){alert("Error: "+err.message)}
    };
    reader.readAsText(file);e.target.value="";
  }

  function startDraft(){
    const order=buildOrder(teams.length,numRounds);
    setDraftOrder(order);
    const tm={};tradedPicks.forEach(t=>{tm[t.fromPick]=teams.indexOf(t.toTeam)});
    const eff=order.map(p=>{const ni=tm[p.overall];return(ni!==undefined&&ni>=0)?{...p,teamIdx:ni}:p});
    const np={};
    keepers.forEach(k=>{
      const round=parseInt(k.round);const ti=teams.indexOf(k.team);if(ti<0)return;
      // Find the team's ORIGINAL pick in this round (before trade reassignment).
      // If a team has multiple picks in the round (e.g. their own + a traded-in pick),
      // the keeper should consume the original pick, not a pick they acquired via trade.
      // originalOwnerIdx tells us who originally owned each pick before trades.
      const originalOrder=order; // original order before trade remapping
      const originalSlot=originalOrder.find(p=>p.round===round&&p.teamIdx===ti&&!np[p.overall]);
      // Fall back to effective order slot if no original found (e.g. traded their own away)
      const slot=originalSlot||eff.find(p=>p.round===round&&p.teamIdx===ti&&!np[p.overall]);
      if(!slot)return;
      const pl=players.find(p=>p.name.toLowerCase()===k.player.toLowerCase());
      if(pl)np[slot.overall]=pl;
    });
    setPicks(np);
    const first=eff.findIndex(p=>!np[p.overall]);
    setCurrentPickIdx(first>=0?first:0);
    setSelPlayer(null);setSearch("");setFilterPos("ALL");
    setScreen("draft");setDraftTab("available");
  }

  function runSim(){
    if(mode!=="mock")return;
    const order=effectiveOrder();let idx=currentPickIdx,np={...picks};
    function step(){
      if(idx>=order.length){setIsSimming(false);return}
      const pick=order[idx];
      if(np[pick.overall]){idx++;step();return}
      if(pick.teamIdx===myIdx){setPicks(np);setCurrentPickIdx(idx);setIsSimming(false);return}
      const roster=getRoster(np,order,pick.teamIdx);
      const pl=simPick(players,new Set(Object.values(np).map(p=>p.name)),variability,roster,pick.round,numRounds,rosterSlots,tendencies);
      if(!pl){setIsSimming(false);return}
      np={...np,[pick.overall]:pl};idx++;
      setPicks({...np});
      setCurrentPickIdx(idx);
      setLastPick({player:pl,team:teams[pick.teamIdx],overall:pick.overall,round:pick.round});
      simRef.current=setTimeout(step,110);
    }
    setIsSimming(true);step();
  }

  function recordPick(player){
    const order=effectiveOrder();const pick=order[currentPickIdx];if(!pick)return;
    const np={...picks,[pick.overall]:player};
    setPicks(np);
    const nextIdx=advance(currentPickIdx+1,np,order);
    setCurrentPickIdx(nextIdx);
    setSelPlayer(null);setSearch("");
    // Snarky msg: ~1-in-8 picks when not drafting as Yonni
    if(myTeam!=="Yonni"&&Math.random()<0.125){
      setSnarkTitleText(snarkTitle());
      setSnarkMsg(snarkMessage());
    }
    // In mock mode, immediately sim the remaining CPU picks
    if(mode==="mock"){
      // Kick off sim from the next pick
      const simFromIdx=nextIdx;
      let idx=simFromIdx,sp={...np};
      function step(){
        if(idx>=order.length){setIsSimming(false);return}
        const pick=order[idx];
        if(sp[pick.overall]){idx++;step();return}
        if(pick.teamIdx===myIdx){setPicks(sp);setCurrentPickIdx(idx);setIsSimming(false);return}
        const roster=getRoster(sp,order,pick.teamIdx);
        const pl=simPick(players,new Set(Object.values(sp).map(p=>p.name)),variability,roster,pick.round,numRounds,rosterSlots,tendencies);
        if(!pl){setIsSimming(false);return}
        sp={...sp,[pick.overall]:pl};idx++;
        setPicks({...sp});
        setCurrentPickIdx(idx);
        setLastPick({player:pl,team:teams[pick.teamIdx],overall:pick.overall,round:pick.round});
        simRef.current=setTimeout(step,110);
      }
      setIsSimming(true);
      simRef.current=setTimeout(step,80);
    }
  }

  const order=effectiveOrder();
  const curPick=order[currentPickIdx];
  const curTeam=curPick?teams[curPick.teamIdx]:null;
  const isMyTurn=!!(curPick&&curPick.teamIdx===myIdx);
  const done=currentPickIdx>=order.length;
  const drafted=new Set(Object.values(picks).map(p=>p.name));
  // Full undrafted pool (ignoring position filter and search) — used for survival probability
  // so that filtering by "RB" doesn't change the probability of WRs being taken
  const availAll=useMemo(()=>players.filter(p=>{
    if(drafted.has(p.name))return false;
    if(p.pos==="K"&&!(rosterSlots.K>0))return false;
    if(p.pos==="DST"&&!(rosterSlots.DST>0))return false;
    return true;
  }),[players,drafted,rosterSlots]);

  const avail=useMemo(()=>players.filter(p=>{
    if(drafted.has(p.name))return false;
    // K and DST hidden unless roster explicitly has slots for them
    if(p.pos==="K"&&!(rosterSlots.K>0))return false;
    if(p.pos==="DST"&&!(rosterSlots.DST>0))return false;
    if(filterPos==="RB/WR"&&p.pos!=="RB"&&p.pos!=="WR")return false;
    if(filterPos!=="ALL"&&filterPos!=="RB/WR"&&p.pos!==filterPos)return false;
    if(search&&!p.name.toLowerCase().includes(search.toLowerCase())&&!p.team.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[players,drafted,filterPos,search,rosterSlots]);
  const rosters={};teams.forEach(t=>rosters[t]=[]);
  order.forEach(pick=>{
    if(picks[pick.overall]){const tn=teams[pick.teamIdx];if(rosters[tn])rosters[tn].push({...picks[pick.overall],pickNum:pick.overall,round:pick.round})}
  });
  const total=order.length,picksDone=Object.keys(picks).length;
  const canStart=players.length>0||mode==="live";

  // Feature 2: top 2 available per position (uses drafted — must be after line above)
  const bestByPos=useMemo(()=>{
    const res={};
    ["QB","RB","WR","TE"].forEach(pos=>{
      res[pos]=players.filter(p=>p.pos===pos&&!drafted.has(p.name)).slice(0,2);
    });
    return res;
  },[players,drafted]);

  // Feature 7: needs summary — my pos counts so far
  const myRoster=rosters[myTeam]||[];
  const myPosCounts=useMemo(()=>{
    const c={QB:0,RB:0,WR:0,TE:0};
    myRoster.forEach(p=>{if(c[p.pos]!==undefined)c[p.pos]++;});
    return c;
  },[myRoster]);

  const survival=useMemo(()=>
    mode==="mock"&&!done&&screen==="draft"
      ?computeSurvival(availAll,picks,order,currentPickIdx,myIdx,numRounds,rosterSlots,tendencies,variability,teams)
      :null
  ,[availAll,picks,order,currentPickIdx,myIdx,numRounds,rosterSlots,tendencies,variability,teams,mode,done,screen]);

  // Always fetch fresh rankings on startup — ensures date and player list stay current
  // even when returning users have a cached version in localStorage
  useEffect(()=>{
    const t=setTimeout(()=>fetchLive("ecr"),800);
    return()=>clearTimeout(t);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);
  useEffect(()=>{
    if(done&&screen==="draft"){
      const t=setTimeout(()=>setScreen("results"),600);
      return()=>clearTimeout(t);
    }
  },[done]);

  const SETUP_TABS=[["settings","Settings"],["board","Draft Board"]];

  /* ─── Football SVG logo mark ─── */
  const FootballMark=()=>(
    <svg width="26" height="18" viewBox="0 0 26 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* Ball body */}
      <ellipse cx="13" cy="9" rx="11.5" ry="7" fill="rgba(255,255,255,0.12)" stroke="white" strokeWidth="1.3"/>
      {/* Laces */}
      <line x1="13" y1="3" x2="13" y2="15" stroke="white" strokeWidth="1.1" strokeDasharray="2.2 1.8"/>
      <line x1="10.5" y1="5.5" x2="15.5" y2="5.5" stroke="white" strokeWidth="1.1"/>
      <line x1="10.5" y1="9" x2="15.5" y2="9" stroke="white" strokeWidth="1.1"/>

                      <select value={tradePick.split(".")[0]||""}
                        onChange={e=>{
                          const r=e.target.value;
                          const pos=tradePick.split(".")[1]||"01";

                        style={{width:100}}>
                        <option value="">Round…</option>

                        onChange={e=>{
                          const r=tradePick.split(".")[0]||"";

                        {Array.from({length:teams.length},(_,i)=>String(i+1).padStart(2,"0")).map(p=>(
                          <option key={p} value={p}>{p}</option>

                      </select>
                    </div>
                    {(()=>{
                      const parts=tradePick.split(".");
                      if(parts.length!==2||!parts[0]||!parts[1])return null;
                      const r=parseInt(parts[0]),pos=parseInt(parts[1]);
                      // Find the pick with this round + pick-within-round in the effective order
                      const roundPicks=order.filter(p=>p.round===r);
                      // snake: odd rounds forward, even rounds reverse
                      const sorted=r%2===1?[...roundPicks].sort((a,b)=>a.overall-b.overall):[...roundPicks].sort((a,b)=>b.overall-a.overall);
                      const slot=sorted[pos-1];
                      if(!slot)return<span style={{fontSize:11,color:"var(--warn)"}}>Pick not found</span>;
                      if(picks[slot.overall])return<span style={{fontSize:11,color:"var(--warn)"}}>Already used (#{slot.overall})</span>;
                      // Store the overall# internally
                      if(tradePick!==String(slot.overall)){
                        // use effect-like: just record the overall pick number
                        setTimeout(()=>setTradePick(`${r}.${parts[1]}_${slot.overall}`),0);
                      }
                      return<span style={{fontSize:11,color:"var(--text3)"}}>
                        Overall #{slot.overall} · currently owned by {teams[slot.teamIdx]}
                      </span>;
                    })()}
                  </div>
                  <div className="frow">
                    <label>Send to team</label>
                    <select value={tradeTeam} onChange={e=>setTradeTeam(e.target.value)}>
                      <option value="">Select team…</option>
                      {teams.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:20,justifyContent:"flex-end"}}>
                  <button className="ghost" onClick={()=>setTradeModal(false)}>Cancel</button>
                  <button className="primary" onClick={applyMidDraftTrade}
                    disabled={!tradePick||!tradeTeam}>Apply Trade</button>
                </div>
              </div>
            </div>
          )}
            </div>{/* end draft-main */}

            {/* ── Roster sidebar — hidden on board tab ── */}
            {draftTab!=="board"&&(
            <div className="draft-sidebar">
              {/* My team — always at top */}
              <div className="sb-my-team-panel">
                <div className="sidebar-title" style={{color:"var(--mag)",marginBottom:8}}>
                  {myTeam}
                  <span style={{fontWeight:500,color:"var(--text3)",fontSize:9,marginLeft:6,textTransform:"none",letterSpacing:0}}>
                    {myRoster.length}/{numRounds}
                  </span>
                </div>
                {(()=>{
                  // Show slots in order: QB, RB×n, WR×n, TE, FLEX, BN×n
                  const POS_ORDER=[
                    ...Array(rosterSlots.QB||1).fill("QB"),
                    ...Array(rosterSlots.RB||2).fill("RB"),
                    ...Array(rosterSlots.WR||3).fill("WR"),
                    ...Array(rosterSlots.TE||1).fill("TE"),
                    ...Array(rosterSlots.FLEX||1).fill("FLEX"),
                    ...Array(rosterSlots.BN||5).fill("BN"),
                  ];
                  // Assign drafted players to slots greedily (earliest pick first)
                  const sorted=[...myRoster].sort((a,b)=>a.pickNum-b.pickNum);
                  const assigned=[];
                  const counts={QB:0,RB:0,WR:0,TE:0,FLEX:0,BN:0};
                  const flexElig=new Set(["RB","WR","TE"]);
                  for(const p of sorted){
                    const pos=p.pos;
                    const slotMax=rosterSlots[pos]||0;
                    if(counts[pos]<slotMax){counts[pos]++;assigned.push({...p,slotLabel:pos});}
                    else if(flexElig.has(pos)&&counts.FLEX<(rosterSlots.FLEX||0)){counts.FLEX++;assigned.push({...p,slotLabel:"FLEX"});}
                    else{counts.BN++;assigned.push({...p,slotLabel:"BN"});}
                  }
                  const posColors={QB:"#FACC15",RB:"var(--teal)",WR:"var(--purp)",TE:"#F472B6",FLEX:"var(--text2)",BN:"var(--text3)"};
                  return POS_ORDER.map((slot,i)=>{
                    const player=assigned.find(p=>p.slotLabel===slot&&!POS_ORDER.slice(0,i).some((_,j)=>POS_ORDER[j]===slot&&assigned.filter(p=>p.slotLabel===slot).indexOf(p)<=POS_ORDER.slice(0,j+1).filter(s=>s===slot).length-1));
                    // Simpler: just render slots in order, matching assigned array
                    const slotPlayers=assigned.filter(p=>p.slotLabel===slot);
                    const slotIdx=POS_ORDER.slice(0,i).filter(s=>s===slot).length;
                    const p=slotPlayers[slotIdx];
                    return(
                      <div key={i} className="sb-my-player">
                        <span className={`sb-slot-label${p?" filled":""}`}
                          style={{color:p?posColors[slot]:"var(--border2)"}}>
                          {slot}
                        </span>
                        {p?(
                          <>
                            <span className="sb-player-name" title={p.name}>
                              {lastName(p.name)}
                            </span>
                            <span className="sb-player-round">R{p.round}</span>
                          </>
                        ):(
                          <span style={{fontSize:10,color:"var(--border2)",fontStyle:"italic"}}>empty</span>
                        )}
                      </div>
                    );
                  });
                })()}
              </div>

              {/* All teams summary */}
              <div className="sidebar-title">All Teams</div>
              {teams.map(t=>{
                const r=rosters[t]||[];
                const byPos={QB:0,RB:0,WR:0,TE:0,K:0,DST:0};
                r.forEach(p=>{if(byPos[p.pos]!==undefined)byPos[p.pos]++;});
                const isMe=t===myTeam;
                return(
                  <div key={t} className={`sb-team${isMe?" sb-mine":""}`}>
                    <div className="sb-name">{t}
                      <span className="sb-count">{r.length}</span>
                    </div>
                    <div className="sb-pos-row">
                      {["QB","RB","WR","TE"].map(pos=>byPos[pos]>0&&(
                        <span key={pos} className={`pb ${pos}`}
                          style={{fontSize:9,padding:"1px 5px"}}>
                          {pos}{byPos[pos]>1?<sup style={{fontSize:8}}>{byPos[pos]}</sup>:""}
                        </span>
                      ))}
                      {r.length===0&&<span style={{fontSize:10,color:"var(--text3)"}}>—</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            )}
          </div>{/* end draft-layout */}
        </div>
      )}

      {/* ── Results screen ── */}
      {screen==="results"&&(
        <ResultsPage
          teams={teams} rosters={rosters} myTeam={myTeam}
          picks={picks} order={order} rosterSlots={rosterSlots}
          isFriends={myTeam!=="Yonni"}
          tradedPicks={tradedPicks} players={players}
          onDraftAgain={()=>{
            clearTimeout(simRef.current);
            setPicks({});setCurrentPickIdx(0);setIsSimming(false);
            setLastPick(null);setSelPlayer(null);setSearch("");setFilterPos("ALL");
            setScreen("setup");setSetupTab("board");
          }}
          onExportCSV={exportCSV}
        />
      )}

      {/* ── Walkthrough ── */}
      {!walkthroughDone&&<Walkthrough
        onDone={(dontShow)=>{
          if(dontShow)localStorage.setItem("wreckineyez-wt","1");
          setWalkthroughDone(true);
        }}
        setSetupTab={setSetupTab}
        screen={screen}
      />}
    </>
  );
}

/* ── Results Page ── */
function ResultsPage({teams,rosters,myTeam,picks,order,onDraftAgain,onExportCSV,rosterSlots,isFriends,tradedPicks,players}){
  const[focus,setFocus]=useState(null);
  const[resultsTab,setResultsTab]=useState("results");
  const canvasRef=useRef(null);
  const[grade]=useState(()=>isFriends?fakeGrade():null);
  const[standings]=useState(()=>
    projectStandings(teams,rosters,rosterSlots,picks,order,myTeam)
  );
  const[showMethodTip,setShowMethodTip]=useState(false);

  // Assign players to roster slots in draft order, bench = overflow
  function assignSlots(roster){
    // Sort by pick order (earliest first)
    const byPick=[...roster].sort((a,b)=>a.pickNum-b.pickNum);
    const slots=[];
    const counts={QB:0,RB:0,WR:0,TE:0,FLEX:0};
    const flexEligible=new Set(["RB","WR","TE"]);
    const benched=[];

    for(const p of byPick){
      const pos=p.pos;
      const slotMax=rosterSlots[pos]||0;
      const flexMax=rosterSlots.FLEX||0;
      if(counts[pos]<slotMax){
        counts[pos]++;
        slots.push({...p,slotLabel:pos});
      } else if(flexEligible.has(pos)&&counts.FLEX<flexMax){
        counts.FLEX++;
        slots.push({...p,slotLabel:"FLEX"});
      } else {
        benched.push({...p,slotLabel:"BN"});
      }
    }
    // Sort starters by position priority
    const PRI={QB:0,RB:1,WR:2,TE:3,FLEX:4};
    slots.sort((a,b)=>(PRI[a.slotLabel]??9)-(PRI[b.slotLabel]??9)||a.pickNum-b.pickNum);
    return{starters:slots,bench:benched};
  }

  function copyRosterImage(teamName){
    const {starters,bench}=assignSlots(rosters[teamName]||[]);
    const allRows=[...starters,{slotLabel:"__divider__"},{...{name:"BENCH",pos:"",slotLabel:"BN",pickNum:999}},...bench.filter((_,i)=>i>0),...(bench.length?[{...bench[0],slotLabel:"BN"}]:[])];
    // Simpler: just render starters then bench
    const rows=[...starters,...bench];
    const W=480,ROW=26,PAD=18,HEADER=56,FOOTER=28,DIVIDER=20;
    const H=HEADER+starters.length*ROW+DIVIDER+bench.length*ROW+PAD+FOOTER;
    const canvas=canvasRef.current;
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0B0B14";ctx.fillRect(0,0,W,H);
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,"#8B5CF6");grad.addColorStop(0.5,"#E8366E");grad.addColorStop(1,"#00C8C0");
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,4);
    ctx.fillStyle="#F0EDE8";ctx.font="bold 22px 'Arial Black', sans-serif";
    ctx.textBaseline="top";ctx.fillText(teamName.toUpperCase(),PAD,14);
    ctx.fillStyle="#5A5868";ctx.font="12px Arial, sans-serif";
    ctx.fillText(`${rows.length} players`,PAD,40);
    const posColors={QB:"#FACC15",RB:"#00C8C0",WR:"#A78BFA",TE:"#F472B6",FLEX:"#CBD5E1",BN:"#5A5868"};
    let y=HEADER;
    const drawRow=(p,isBench,rowIdx)=>{
      if(rowIdx%2===0){ctx.fillStyle="rgba(255,255,255,0.025)";ctx.fillRect(0,y-2,W,ROW);}
      const pc=posColors[p.slotLabel]||"#9896A8";
      const slotW=36;
      ctx.fillStyle=pc+"28";ctx.beginPath();ctx.roundRect(PAD,y+1,slotW,ROW-6,3);ctx.fill();
      ctx.fillStyle=isBench?"#5A5868":pc;ctx.font="bold 10px Arial, sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(p.slotLabel,PAD+slotW/2,y+ROW/2);
      ctx.textAlign="left";
      ctx.fillStyle=isBench?"#5A5868":"#F0EDE8";ctx.font="bold 13px Arial, sans-serif";
      ctx.textBaseline="middle";ctx.fillText(p.name,PAD+slotW+8,y+ROW/2);
      ctx.fillStyle="#5A5868";ctx.font="11px Arial, sans-serif";
      ctx.textAlign="right";ctx.fillText(`R${p.round}`,W-PAD,y+ROW/2);
      ctx.textAlign="left";
      y+=ROW;
    };
    starters.forEach((p,i)=>drawRow(p,false,i));
    if(bench.length){
      ctx.fillStyle="#222236";ctx.fillRect(0,y,W,DIVIDER);
      ctx.fillStyle="#5A5868";ctx.font="bold 10px Arial, sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("BENCH",W/2,y+DIVIDER/2);ctx.textAlign="left";
      y+=DIVIDER;
      bench.forEach((p,i)=>drawRow(p,true,i));
    }
    ctx.fillStyle="#5A5868";ctx.font="11px Arial, sans-serif";
    ctx.textBaseline="bottom";ctx.fillText("Wreckineyez Mock Draft",PAD,H-6);
    canvas.toBlob(blob=>{
      if(!blob)return;
      navigator.clipboard.write([new ClipboardItem({"image/png":blob})])
        .then(()=>alert(`${teamName}'s roster copied to clipboard!`))
        .catch(()=>{const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${teamName}-roster.png`;a.click();});
    },"image/png");
  }

  const posShortCounts=(roster)=>{
    const c={QB:0,RB:0,WR:0,TE:0};
    roster.forEach(p=>{if(c[p.pos]!==undefined)c[p.pos]++;});
    return c;
  };

  const POS_ORDER=["QB","RB","WR","TE","K","DST","FLEX"];
  function sortRoster(roster){
    return [...roster].sort((a,b)=>{
      const pi=POS_ORDER.indexOf(a.pos),qi=POS_ORDER.indexOf(b.pos);
      if(pi!==qi)return(pi<0?99:pi)-(qi<0?99:qi);
      return a.pickNum-b.pickNum;
    });
  }

  return(
    <div className="page results-page">
      <canvas ref={canvasRef} id="roster-canvas"/>

      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",
        marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:36,
            textTransform:"uppercase",letterSpacing:"0.04em",lineHeight:1}}>
            <span style={{color:"var(--teal)"}}>🏈</span> Draft Complete
          </div>
          <div style={{fontSize:13,color:"var(--text3)",marginTop:6}}>
            {Object.keys(picks).length} picks · {teams.length} teams
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={onExportCSV} style={{fontSize:12,padding:"8px 16px"}}>⬇ Export CSV</button>
          <button className="hot" onClick={onDraftAgain} style={{fontSize:13,padding:"9px 20px",fontWeight:800}}>
            Draft Again →
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs" style={{marginBottom:20}}>
        {[["results","Results"],["board","Draft Board"]].map(([id,lbl])=>(
          <button key={id} className={`tab${resultsTab===id?" on":""}`}
            onClick={()=>setResultsTab(id)}>{lbl}</button>
        ))}
      </div>

      {/* Draft board tab */}
      {resultsTab==="board"&&(
        <LiveBoard
          order={order} picks={picks} teams={teams}
          myIdx={teams.indexOf(myTeam)} numRounds={order.length/teams.length}
          currentPickIdx={order.length} tradedPicks={tradedPicks}
          players={players} drafted={new Set(Object.values(picks).map(p=>p.name))}
          onEditPick={null}
        />
      )}

      {/* Results tab */}
      {resultsTab==="results"&&isFriends&&grade&&(
        <div style={{background:"var(--s1)",border:"2px solid var(--mag-border)",
          borderRadius:"var(--rl)",padding:"20px 24px",marginBottom:20,
          display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
          <div style={{textAlign:"center",minWidth:80}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,
              fontSize:72,lineHeight:1,color:"var(--mag)"}}>{grade}</div>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",
              letterSpacing:"0.08em",color:"var(--text3)"}}>Draft Grade</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:6}}>
              {grade==="F-"?"Historically bad draft. Truly."
                :grade==="F"?"Not great. Not great at all."
                :grade==="D-"?"Some concerning choices were made today."
                :"Participation award: issued."}
            </div>
            <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.6}}>
              Our proprietary draft grading algorithm — trained on thousands of drafts, incapable of
              bias, and completely indifferent to your feelings — has reviewed your selections. This is its verdict.
            </div>
          </div>
        </div>
      )}

      {resultsTab==="results"&&(()=>{
        const {starters,bench}=assignSlots(rosters[myTeam]||[]);
        const hasBreakdown=starters.length>0||bench.length>0;
        const hasStandings=standings&&standings.length>0;
        if(!hasStandings&&!hasBreakdown)return null;

        const POS_COLORS={QB:"#FACC15",RB:"var(--teal)",WR:"var(--purp)",TE:"#F472B6",FLEX:"var(--text2)"};

        function PlayerRow({p,isBench}){
          const proj=isBench?null:Math.round(adpExpectedPts(p.pos,p.rank||p.pickNum||100));
          const col=POS_COLORS[p.slotLabel]||"var(--text3)";
          return(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",
              borderRadius:"var(--r)",background:"var(--s2)",
              borderLeft:`3px solid ${isBench?"var(--border2)":col}`}}>
              <span style={{fontSize:9,fontWeight:800,textTransform:"uppercase",
                letterSpacing:"0.06em",width:30,flexShrink:0,
                color:isBench?"var(--text3)":col}}>{p.slotLabel}</span>
              <span style={{flex:1,fontSize:11,fontWeight:600,color:"var(--text)",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
              <span style={{fontSize:10,color:"var(--text3)",flexShrink:0,marginRight:2}}>R{p.round}</span>
              {proj!==null
                ?<span style={{fontSize:11,fontWeight:700,color:col,minWidth:32,textAlign:"right",flexShrink:0}}>{proj}</span>
                :<span style={{fontSize:10,color:"var(--text3)",minWidth:32,textAlign:"right",flexShrink:0}}>—</span>}
            </div>
          );
        }

        const posOrder=["QB","RB","WR","TE","FLEX"];
        const grouped={};
        starters.forEach(p=>{if(!grouped[p.slotLabel])grouped[p.slotLabel]=[];grouped[p.slotLabel].push(p);});
        const totalStarter=starters.reduce((s,p)=>s+adpExpectedPts(p.pos,p.rank||p.pickNum||100),0);

        return(
          <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"stretch",flexWrap:"wrap"}}>

            {/* Left: standings */}
            {hasStandings&&(
              <div style={{flex:"1 1 220px",background:"var(--s1)",border:"1px solid var(--border)",
                borderRadius:"var(--rl)",padding:"16px 18px"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",
                    color:"var(--text3)"}}>Projected Standings</div>
                  <div style={{position:"relative",display:"inline-flex"}}>
                    <span onMouseEnter={()=>setShowMethodTip(true)} onMouseLeave={()=>setShowMethodTip(false)}
                      style={{fontSize:10,color:"var(--text3)",cursor:"default",width:15,height:15,
                        borderRadius:"50%",border:"1px solid var(--border2)",display:"inline-flex",
                        alignItems:"center",justifyContent:"center",fontWeight:700,userSelect:"none"}}>?</span>
                    {showMethodTip&&(
                      <div style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",
                        transform:"translateX(-50%)",width:240,background:"var(--s2)",
                        border:"1px solid var(--border2)",borderRadius:"var(--r)",padding:"10px 12px",
                        fontSize:11,color:"var(--text2)",lineHeight:1.6,zIndex:50,
                        boxShadow:"0 8px 24px rgba(0,0,0,0.5)",pointerEvents:"none",whiteSpace:"normal"}}>
                        <strong style={{color:"var(--text)",display:"block",marginBottom:4}}>How projections work</strong>
                        Each team's starters are scored using a fitted ECR→expected points model
                        (exponential decay for RB/WR/TE, linear for QB) calibrated on 154 player-seasons
                        from 2021–2024. Bench excluded. Individual variance is high.
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {standings.map((row,i)=>(
                    <div key={row.team} style={{display:"flex",alignItems:"center",gap:8,
                      padding:"5px 8px",borderRadius:"var(--r)",
                      background:row.isYonni?"var(--teal-dim)":row.isYou?"var(--mag-dim)":"var(--s2)",
                      border:row.isYonni?"1px solid var(--teal-border)":row.isYou?"1px solid var(--mag-border)":"1px solid transparent"}}>
                      <span style={{fontSize:10,fontWeight:700,color:"var(--text3)",width:18,textAlign:"center",flexShrink:0}}>{i+1}</span>
                      <span style={{flex:1,fontSize:12,fontWeight:row.isYonni||row.isYou?700:400,
                        color:row.isYonni?"var(--teal)":row.isYou?"var(--mag)":"var(--text)",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {row.team}
                        {row.isYonni&&<span style={{fontSize:9,marginLeft:5,color:"var(--teal)"}}>🏆</span>}
                      </span>
                      <span style={{fontSize:11,fontWeight:600,color:"var(--text2)",flexShrink:0,fontVariantNumeric:"tabular-nums"}}>
                        {row.projPts.toLocaleString()}
                      </span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"var(--text3)",marginTop:8,fontStyle:"italic"}}>
                  {isFriends?"* Results may vary. Okay, they definitely will for you.":"* Starter pts · ECR model"}
                </div>
              </div>
            )}

            {/* Right: my team pos breakdown */}
            {hasBreakdown&&(
              <div style={{flex:"1 1 220px",background:"var(--s1)",border:"1px solid var(--mag-border)",
                borderRadius:"var(--rl)",padding:"16px 18px"}}>
                <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:10,gap:8}}>
                  <div style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--mag)"}}>
                    {myTeam}
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--teal)",flexShrink:0}}>
                    {Math.round(totalStarter).toLocaleString()} pts
                    <span style={{fontSize:10,color:"var(--text3)",fontWeight:400,marginLeft:4}}>starters</span>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:bench.length?10:0}}>
                  {posOrder.map(slot=>{
                    const players=grouped[slot];
                    if(!players||!players.length)return null;
                    const slotTotal=Math.round(players.reduce((s,p)=>s+adpExpectedPts(p.pos,p.rank||p.pickNum||100),0));
                    const col=POS_COLORS[slot]||"var(--text3)";
                    return(
                      <div key={slot}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                          <span style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:col}}>{slot}</span>
                          <span style={{fontSize:10,fontWeight:700,color:col}}>{slotTotal}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:2}}>
                          {players.map(p=><PlayerRow key={p.pickNum} p={p} isBench={false}/>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {bench.length>0&&(
                  <>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                      <div style={{flex:1,height:1,background:"var(--border2)"}}/>
                      <span style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--text3)"}}>Bench</span>
                      <div style={{flex:1,height:1,background:"var(--border2)"}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      {bench.map(p=><PlayerRow key={p.pickNum} p={p} isBench={true}/>)}
                    </div>
                  </>
                )}
                <div style={{fontSize:10,color:"var(--text3)",marginTop:8,fontStyle:"italic"}}>
                  ECR rank → pts model
                </div>
              </div>
            )}
          </div>
        );
      })()}
