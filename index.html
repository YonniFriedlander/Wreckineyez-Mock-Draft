// ADP → expected 0 PPR standard points model
// Fitted to 154 player-seasons 2021-2024 (FFC non-PPR 12-team ADP + PFR standard pts)
// QB: linear  pts = 429.3 - 1.82*ecr   (R²=0.71)
// RB: exp     pts = 365.9*e^(-0.00524*ecr) - 65.0  (R²=0.91)
// WR: exp     pts = 259.3*e^(-0.01197*ecr) + 47.7   (R²=0.95)
// TE: exp     pts = 227.2*e^(-0.01455*ecr) + 15.9   (R²=0.98)
function adpExpectedPts(pos, ecr){
  if(!ecr||ecr<=0)return 0;
  switch(pos){
    case"QB": return Math.max(0, 429.323 - 1.8205*ecr);
    case"RB": return Math.max(0, 365.866*Math.exp(-0.005238*ecr) - 65.023);
    case"WR": return Math.max(0, 259.322*Math.exp(-0.011966*ecr) + 47.734);
    case"TE": return Math.max(0, 227.156*Math.exp(-0.014546*ecr) + 15.951);
    default:  return 0;
  }
}

function projectStandings(teams, rosters, rosterSlots, picks, order, myTeam){
  const scored=teams.map(team=>{
    const roster=rosters[team]||[];
    const byPick=[...roster].sort((a,b)=>a.pickNum-b.pickNum);
    const slots=[];
    const counts={QB:0,RB:0,WR:0,TE:0,FLEX:0};
    const flexElig=new Set(["RB","WR","TE"]);
    for(const p of byPick){
      const pos=p.pos;
      const slotMax=rosterSlots[pos]||0;
      if(counts[pos]<slotMax){counts[pos]++;slots.push(p);}
      else if(flexElig.has(pos)&&counts.FLEX<(rosterSlots.FLEX||0)){counts.FLEX++;slots.push(p);}
    }
    const projPts=slots.reduce((sum,p)=>{
      const ecr=p.rank||p.pickNum||100;
      return sum+adpExpectedPts(p.pos,ecr);
    },0);
    return{team,projPts:Math.round(projPts),isYou:team===myTeam,isYonni:team==="Yonni"};
  });
  scored.sort((a,b)=>b.projPts-a.projPts);
  return scored;
}

const DRAFT_DATE=new Date("2026-08-28T19:00:00-05:00"); // Aug 28 2026, 7pm EST

function Countdown(){
  const[now,setNow]=useState(()=>new Date());
  useEffect(()=>{
    const id=setInterval(()=>setNow(new Date()),1000);
    return()=>clearInterval(id);
  },[]);

  const diff=DRAFT_DATE-now;

  if(diff<=0){
    return(
      <div className="countdown">
        <span className="countdown-live">🏈 Draft Day!</span>
        <span style={{fontSize:13,color:"var(--text2)",marginLeft:4}}>Good luck everyone.</span>
      </div>
    );
  }

  const totalSecs=Math.floor(diff/1000);
  const d=Math.floor(totalSecs/86400);
  const h=Math.floor((totalSecs%86400)/3600);
  const m=Math.floor((totalSecs%3600)/60);
  const s=totalSecs%60;

  const pad=n=>String(n).padStart(2,"0");

  return(
    <div className="countdown">
      <span className="countdown-label">Draft in</span>
      <div className="countdown-units">
        {d>0&&(
          <div className="countdown-unit">
            <span className="countdown-num">{d}</span>
            <span className="countdown-sub">{d===1?"day":"days"}</span>
          </div>
        )}
        <div className="countdown-unit">
          <span className="countdown-num">{pad(h)}</span>
          <span className="countdown-sub">hrs</span>
        </div>
        <div className="countdown-unit">
          <span className="countdown-num">{pad(m)}</span>
          <span className="countdown-sub">min</span>
        </div>
        <div className="countdown-unit">
          <span className="countdown-num">{pad(s)}</span>
          <span className="countdown-sub">sec</span>
        </div>
      </div>
      <span style={{fontSize:11,color:"var(--text3)",flexShrink:0}}>
        Aug 28 · 7:00 PM EST
      </span>
    </div>
  );
}

function Walkthrough({onDone,setSetupTab,screen}){
  const[step,setStep]=useState(0);
  const[dontShow,setDontShow]=useState(false);
  const[targetRect,setTargetRect]=useState(null);
  const[arrowReady,setArrowReady]=useState(false);  // only show arrow after box repositions
  const stepRef=useRef(0);
  const boxRef=useRef(null);
  const total=WT_STEPS.length;
  const curr=WT_STEPS[step];

  useEffect(()=>{
    stepRef.current=step;
    if(curr.tab&&screen==="setup"&&setSetupTab)setSetupTab(curr.tab);
    // Clear immediately to prevent flash from previous step's rect
    setTargetRect(null);
    if(curr.target){
      const t=setTimeout(()=>{
        if(stepRef.current!==step)return;
        const el=document.querySelector(`[data-wt="${curr.target}"]`);
        if(el){
          const r=el.getBoundingClientRect();
          setTargetRect({cx:r.left+r.width/2,cy:r.top+r.height/2,
            w:r.width,h:r.height,top:r.top,left:r.left});
        }
      },180);
      return()=>clearTimeout(t);
    }
    // Step 3: scroll the settings detail cards into view
    if(step===3){
      const t2=setTimeout(()=>{
        const cards=document.querySelectorAll(".card");
        if(cards.length>1)cards[1].scrollIntoView({behavior:"smooth",block:"start"});
      },250);
      return()=>clearTimeout(t2);
    }
  },[step]);

  // Arrow only shows after the callout box has moved to its target-based position.
  // targetRect arriving → box moves → one rAF later → read box position → show arrow.
  useEffect(()=>{
    if(!targetRect){setArrowReady(false);return;}
    // Two rAFs: first lets React commit the new box position, second measures it
    let id1=requestAnimationFrame(()=>{
      let id2=requestAnimationFrame(()=>setArrowReady(true));
      return()=>cancelAnimationFrame(id2);
    });
    return()=>cancelAnimationFrame(id1);
  },[targetRect]);

  function renderBody(text,highlights){
    if(!highlights||!highlights.length)return text;
    const escaped=highlights.map(h=>h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
    const parts=text.split(new RegExp(`(${escaped.join('|')})`));
    return parts.map((p,i)=>
      highlights.includes(p)
        ?React.createElement('strong',{key:i,style:{color:"var(--teal)"}},''+p)
        :p
    );
  }

  function advance(){if(step<total-1)setStep(s=>s+1);else onDone(dontShow);}
  function back(){if(step>0)setStep(s=>s-1);}

  const vw=typeof window!=="undefined"?window.innerWidth:1200;
  const vh=typeof window!=="undefined"?window.innerHeight:800;
  const BOX_W=Math.min(380,vw-32);

  let boxLeft,boxTop;
  if(targetRect){
    boxLeft=Math.max(16,Math.min(targetRect.cx-BOX_W/2,vw-BOX_W-16));
    const spaceBelow=vh-(targetRect.cy+targetRect.h/2);
    boxTop=spaceBelow>240?targetRect.cy+targetRect.h/2+24:targetRect.cy-targetRect.h/2-300;
    boxTop=Math.max(70,Math.min(boxTop,vh-320));
  } else {
    boxLeft=(vw-BOX_W)/2;
    boxTop=Math.max(70,(vh-440)/2);
  }

  // Compute arrow from actual box position (via ref) to target
  const getArrow=()=>{
    if(!targetRect||!arrowReady||!boxRef.current)return null;
    const br=boxRef.current.getBoundingClientRect();
    const x1=br.left+br.width/2;
    const y1=targetRect.cy>br.bottom?br.bottom:br.top;
    const x2=targetRect.cx;
    const y2=targetRect.cy>br.bottom?targetRect.top-10:targetRect.top+targetRect.h+10;
    return{x1,y1,x2,y2};
  };
  const arrow=getArrow();

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,pointerEvents:"none"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.62)",pointerEvents:"all"}}
        onClick={()=>onDone(dontShow)}/>

      {targetRect&&(
        <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",
          overflow:"visible",zIndex:201,pointerEvents:"none"}}>
          <defs>
            <marker id="wt-arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
              <path d="M0,0 L0,6 L9,3 z" fill="#00C8C0"/>
            </marker>
          </defs>
          <rect
            x={targetRect.left-8} y={targetRect.top-8}
            width={targetRect.w+16} height={targetRect.h+16}
            rx="8" fill="none" stroke="#00C8C0" strokeWidth="2.5"
            style={{filter:"drop-shadow(0 0 8px rgba(0,200,192,0.8))"}}>
            <animate attributeName="stroke-opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
          </rect>
          {arrow&&(
            <line x1={arrow.x1} y1={arrow.y1} x2={arrow.x2} y2={arrow.y2}
              stroke="#00C8C0" strokeWidth="2.5" strokeDasharray="7,4" opacity="0.9"
              markerEnd="url(#wt-arr)"/>
          )}
        </svg>
      )}

      <div ref={boxRef} style={{
        position:"fixed",left:boxLeft,top:boxTop,width:BOX_W,
        background:"var(--s1)",border:"1px solid var(--border2)",
        borderRadius:"var(--rxl)",padding:"22px 26px",
        boxShadow:"0 24px 80px rgba(0,0,0,0.88),0 0 0 1px rgba(0,200,192,0.12)",
        pointerEvents:"all",zIndex:202,
      }}>
        <div style={{display:"flex",gap:3,marginBottom:14}}>
          {WT_STEPS.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{
              height:4,borderRadius:2,cursor:"pointer",transition:"all 0.25s",
              flex:i===step?3:1,
              background:i===step?"var(--teal)":i<step?"var(--teal-border)":"var(--border2)",
            }}/>
          ))}
        </div>

        {curr.tab&&(
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",
            color:"var(--teal)",marginBottom:7,display:"flex",alignItems:"center",gap:5}}>
            <span>↑</span> {curr.tab.charAt(0).toUpperCase()+curr.tab.slice(1)} tab — active
          </div>
        )}

        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:21,
          textTransform:"uppercase",letterSpacing:"0.04em",color:"var(--text)",marginBottom:9}}>
          {curr.title}
        </div>

        <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.7,
          marginBottom:curr.preview?12:18}}>
          {renderBody(curr.body,curr.hl)}
        </div>

        {curr.preview&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {curr.preview.map((pv,i)=>(
              <div key={i} style={{display:"inline-flex",alignItems:"center",gap:6,
                padding:"6px 12px",borderRadius:"var(--r)",
                background:"rgba(0,0,0,0.35)",border:`1px solid ${pv.color}44`}}>
                <span style={{fontSize:16,color:pv.color}}>{pv.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:pv.color}}>{pv.label}</span>
              </div>
            ))}
            <span style={{fontSize:11,color:"var(--text3)",alignSelf:"center"}}>— appear during the draft</span>
          </div>
        )}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
            fontSize:11,color:"var(--text3)",userSelect:"none"}}>
            <input type="checkbox" checked={dontShow} onChange={e=>setDontShow(e.target.checked)}
              style={{cursor:"pointer"}}/>
            Don't show at startup
          </label>
          <div style={{display:"flex",gap:7}}>
            {step>0&&(
              <button className="ghost" onClick={back}
                style={{fontSize:12,padding:"5px 11px"}}>← Back</button>
            )}
            <button className="ghost" onClick={()=>onDone(dontShow)}
              style={{fontSize:11,padding:"5px 10px",color:"var(--text3)"}}>Skip</button>
            {step<total-1?(
              <button className="primary" onClick={advance}
                style={{padding:"6px 16px",fontSize:13,fontWeight:700}}>Next →</button>
            ):(
              <button className="hot" onClick={()=>onDone(dontShow)}
                style={{padding:"6px 16px",fontSize:13,fontWeight:800}}>Let's draft!</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function QueueList({queue,setQueue,drafted,canPick,onPick}){
  const dragIdx=useRef(null);
  const[overIdx,setOverIdx]=useState(null);

  function onDragStart(i){dragIdx.current=i}
  function onDragOver(e,i){e.preventDefault();setOverIdx(i)}
  function onDrop(i){
    if(dragIdx.current===null||dragIdx.current===i){setOverIdx(null);return}
    const q=[...queue];const[m]=q.splice(dragIdx.current,1);q.splice(i,0,m);
    setQueue(q);dragIdx.current=null;setOverIdx(null);
  }

  if(!queue.length)return(
    <div style={{padding:"10px 4px",fontSize:12,color:"var(--text3)"}}>
      No players queued. Click a player in the available list then "+ Add selected" above.
    </div>
  );

  const available=queue.filter(n=>!drafted.has(n));
  const taken=queue.filter(n=>drafted.has(n));

  return(
    <div className="queue-list">
      {queue.map((name,i)=>{
        const isDrafted=drafted.has(name);
        const pos=available.indexOf(name)+1;
        return(
          <div key={name}
            className={`q-item${overIdx===i?" ghost-over":""}${isDrafted?" drafted":""}`}
            draggable onDragStart={()=>onDragStart(i)}
            onDragOver={e=>onDragOver(e,i)} onDrop={()=>onDrop(i)}
            onDragEnd={()=>setOverIdx(null)}>
            <span className="q-drag">⠿</span>
            {!isDrafted&&<span className="q-num">{pos}</span>}
            {isDrafted&&<span style={{fontSize:9,color:"var(--text3)",fontWeight:800,
              textTransform:"uppercase",minWidth:16}}>✓</span>}
            <span style={{fontSize:12,fontWeight:isDrafted?500:700,flex:1,
              textDecoration:isDrafted?"line-through":"none",color:isDrafted?"var(--text3)":"var(--text)"}}>
              {name}
            </span>
            {canPick&&!isDrafted&&(
              <button className="primary q-draft-btn" onClick={()=>onPick(name)}>
                Draft
              </button>
            )}
            {isDrafted&&(
              <span style={{fontSize:10,color:"var(--text3)",marginRight:4}}>taken</span>
            )}
            <button className="ghost" style={{padding:"2px 6px",fontSize:14,lineHeight:1,color:"var(--text3)"}}
              onClick={()=>setQueue(q=>q.filter((_,j)=>j!==i))}>×</button>
          </div>
        );
      })}
      {taken.length>0&&(
        <button className="ghost" style={{fontSize:11,marginTop:4,color:"var(--text3)"}}
          onClick={()=>setQueue(q=>q.filter(n=>!drafted.has(n)))}>
          Clear taken ({taken.length})
        </button>
      )}
    </div>
  );
}

/* ── Live draft board ── */
function LiveBoard({order,picks,teams,myIdx,numRounds,currentPickIdx,tradedPicks,players,drafted,onEditPick}){
  const rounds=Array.from({length:numRounds},(_,i)=>i+1);
  const[editModal,setEditModal]=useState(null); // {overall, currentPlayer}
  const[editSearch,setEditSearch]=useState("");

  const tradeMap={};
  if(tradedPicks) tradedPicks.forEach(t=>tradeMap[t.fromPick]=true);

  const n=teams.length;
  function origTeamIdx(overall){
    const round=Math.ceil(overall/n);
    const posInRound=((overall-1)%n)+1;
    const slotInRound=round%2===1?posInRound:n-posInRound+1;
    return slotInRound-1;
  }

  function openEdit(pick){
    setEditSearch("");
    setEditModal({overall:pick.overall,current:picks[pick.overall]||null});
  }

  const editResults=useMemo(()=>{
    if(!editSearch.trim()||!players)return[];
    const q=editSearch.toLowerCase();
    return players.filter(p=>p.name.toLowerCase().includes(q)||p.team.toLowerCase().includes(q)).slice(0,8);
  },[editSearch,players]);

  return(
    <div className="board-wrap">
      <table className="btable">
        <thead>
          <tr>
            <th className="rh" style={{background:"var(--bg)"}}></th>
            {teams.map((t,i)=><th key={i} className={i===myIdx?"mine-h":""}><span className="bth-inner">{t}</span></th>)}
          </tr>
        </thead>
        <tbody>
          {rounds.map(r=>{
            const byEffective={};
            const byOriginal={};
            order.filter(p=>p.round===r).forEach(p=>{
              const isTrade=tradedPicks&&tradedPicks.some(t=>t.fromPick===p.overall);
              const isDrafted=!!picks[p.overall];
              if(isTrade&&!isDrafted){
                const oi=origTeamIdx(p.overall);
                if(!byOriginal[oi])byOriginal[oi]=[];
                byOriginal[oi].push(p);
              } else {
                if(!byEffective[p.teamIdx])byEffective[p.teamIdx]=[];
                byEffective[p.teamIdx].push(p);
              }
            });

            return(
              <tr key={r}>
                <td className="rh">{r}</td>
                {teams.map((_,i)=>{
                  const effPicks=byEffective[i]||[];
                  const origPicks=byOriginal[i]||[];
                  const allPicks=[...effPicks,...origPicks];
                  if(!allPicks.length)return<td key={i} className={i===myIdx?"mine-col":""}/>;
                  const isCurCell=allPicks.some(p=>order.findIndex(o=>o.overall===p.overall)===currentPickIdx);
                  return(
                    <td key={i}
                      className={`${i===myIdx?"mine-col":""}${isCurCell?" cur":""}`}
                      title="Click to edit"
                      style={{cursor:"pointer"}}
                      onClick={()=>openEdit(allPicks[0])}>
                      {allPicks.map(pick=>{
                        const player=picks[pick.overall];
                        const isTrade=tradedPicks&&tradedPicks.some(t=>t.fromPick===pick.overall);
                        const origIdx=origTeamIdx(pick.overall);
                        const origName=teams[origIdx]||"";
                        const newOwner=teams[pick.teamIdx]||"";
                        const isOriginalOwner=(origIdx===i);
                        return(
                          <div key={pick.overall} className="bcell">
                            {player?(
                              <>
                                <div style={{display:"flex",alignItems:"center",gap:2,justifyContent:"center"}}>
                                  <PB pos={player.pos} posRank={player.posRank||player.pos} style={{fontSize:8,padding:"0 3px"}}/>
                                </div>
                                <span className="bn">{lastName(player.name)}</span>
                                {isTrade&&<span className="bm" style={{color:"var(--warn)",fontSize:7}}>via {teams[origTeamIdx(pick.overall)]?.slice(0,4).toUpperCase()}</span>}
                              </>
                            ):(
                              isTrade&&isOriginalOwner?(
                                <>
                                  <span className="bm" style={{color:"var(--warn)"}}>→</span>
                                  <span className="bn" style={{color:"var(--warn)"}}>{teams[pick.teamIdx]?.slice(0,5)}</span>
                                </>
                              ):(
                                <span className="bnum">#{pick.overall}</span>
                              )
                            )}
                          </div>
                        );
                      })}
                    </td>
                  );
                })}
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Edit pick modal */}
      {editModal&&(
        <div className="overlay" onClick={()=>setEditModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Edit Pick #{editModal.overall}</div>
            <div className="modal-sub">
              {editModal.current
                ?<>Currently: <strong>{editModal.current.name}</strong> — search to replace, or clear</>
                :"No pick yet — search to force assign"}
            </div>
            <div style={{position:"relative",marginBottom:12}}>
              <input autoFocus value={editSearch} onChange={e=>setEditSearch(e.target.value)}
                placeholder="Search player…" style={{width:"100%"}}/>
              {editResults.length>0&&(
                <div className="ac-list">
                  {editResults.map(p=>(
                    <div key={p.name} className="ac-item" onClick={()=>{
                      onEditPick(editModal.overall,p);
                      setEditModal(null);
                    }}>
                      <PB pos={p.pos} posRank={p.pos}/>
                      <span style={{fontWeight:600}}>{p.name}</span>
                      <span style={{fontSize:11,color:"var(--text3)",marginLeft:"auto"}}>{p.team} · #{p.rank}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
              {editModal.current&&(
                <button className="danger-ghost" onClick={()=>{
                  onEditPick(editModal.overall,null);
                  setEditModal(null);
                }}>Clear pick</button>
              )}
              <button className="ghost" onClick={()=>setEditModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          {!roster.length&&<span style={{color:"var(--text3)",fontSize:13}}>No picks yet</span>}

      {sorted.length>0&&(
        <div className="ptable-wrap">
          <table className="ptable">
            <thead>
              <tr>
                <th style={{width:36}}>Rd</th><th style={{width:44}}>#</th>
                <th>Player</th><th style={{width:64}}>Pos</th>
                <th style={{width:50}}>NFL</th><th style={{width:40}}>Bye</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(p=>(
                <tr key={p.pickNum}>
                  <td style={{color:"var(--text3)",fontWeight:600}}>{p.round}</td>
                  <td style={{color:"var(--text3)",fontWeight:600}}>{p.pickNum}</td>
                  <td style={{fontWeight:600}}>{p.name}</td>
                  <td><PB pos={p.pos} posRank={p.posRank}/></td>
                  <td style={{color:"var(--text2)",fontSize:12,fontWeight:500}}>{p.team}</td>
                  <td style={{color:"var(--text3)",fontSize:12}}>{p.bye}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {!sorted.length&&!showCounts&&<p style={{color:"var(--text3)",padding:"12px 0",fontSize:13}}>No picks yet.</p>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
