name: Update Rankings

on:
  schedule:
    # Runs every Tuesday at 9am EST (2pm UTC) during draft season
    - cron: '0 14 * * 2'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch rankings
        run: python3 generate_rankings_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rankings.json
          if git diff --staged --quiet; then
            echo "No changes to rankings — skipping commit"
          else
            git commit -m "Auto-update rankings $(date -u '+%Y-%m-%d')"
            git push
          fi
